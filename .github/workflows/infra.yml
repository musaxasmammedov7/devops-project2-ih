name: Deploy Infrastructure (Terraform)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_sql_admin_username: ${{ secrets.SQL_ADMIN_USERNAME }}
  TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
  TF_VAR_vm_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

jobs:
  terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Create Terraform State Storage Account
      run: |
        az group create --name tfstate-rg --location eastus
        az storage account create --name tfstatemusa2026 --resource-group tfstate-rg --location eastus --sku Standard_LRS --encryption-services blob
        az storage container create --name tfstate --account-name tfstatemusa2026

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.5"

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="resource_group_name=tfstate-rg" \
          -backend-config="storage_account_name=tfstatemusa2026" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=prod.terraform.tfstate"

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -out=tfplan

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve tfplan

    - name: Extract SonarQube IP
      if: github.ref == 'refs/heads/main'
      id: extract_ip
      run: |
        SONAR_IP=$(terraform output -raw sonar_public_ip_raw)
        echo "SONAR_IP=$SONAR_IP" >> $GITHUB_ENV
        echo "Extracted IP: $SONAR_IP"

    - name: Setup SSH
      if: github.ref == 'refs/heads/main'
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VM_SSH_PRIVATE_KEY }}

    - name: Run Ansible Playbook (Install SonarQube)
      if: github.ref == 'refs/heads/main'
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
      run: |
        
        # Go to ansible directory
        cd ../../config/ansible
        
        # Inject IP into inventory
        echo "[sonarqube]" > inventories/prod/hosts
        echo "$SONAR_IP" >> inventories/prod/hosts
        
        # Run Ansible
        ansible-playbook -i inventories/prod/hosts playbooks/sonarqube.yml
