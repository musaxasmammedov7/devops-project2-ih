name: Build and Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

env:
  AZURE_WEBAPP_NAME: burger-fe-app # Replace if prefix changed
  NODE_VERSION: '20.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run Tests & Coverage
      run: npm run test:coverage

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        projectBaseDir: frontend
        args: >
          -Dsonar.projectKey=burger-frontend
          -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
          -Dsonar.cpd.exclusions=**/*.test.tsx,**/*.css,**/*.scss,**/types.ts,**/api.ts
          -Dsonar.exclusions=**/*.test.tsx,**/*.css,**/*.scss,**/types.ts,**/api.ts
    - name: Build
      run: npm run build

    - name: Zip Artifact
      run: cd dist && zip -r ../frontend.zip .

    - name: Upload artifact for deployment
      uses: actions/upload-artifact@v4
      with:
        name: frontend-app
        path: frontend/frontend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-app

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VM_SSH_PRIVATE_KEY }}

    - name: Deploy to FE VMSS via SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
      run: |
        # Save private key to file
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # Get SonarQube Public IP
        SONAR_IP=$(az network public-ip show -g musa-project2-rg -n burger-sonar-pip --query ipAddress -o tsv)
        
        # Setup SSH config for ProxyJump
        cat << EOF > ~/.ssh/config
        Host sonarqube
          HostName $SONAR_IP
          User azureuser
          IdentityFile ~/.ssh/id_rsa
          PubkeyAcceptedKeyTypes +ssh-rsa
          StrictHostKeyChecking no
        
        Host 10.0.*
          User azureuser
          ProxyJump sonarqube
          IdentityFile ~/.ssh/id_rsa
          PubkeyAcceptedKeyTypes +ssh-rsa
          StrictHostKeyChecking no
        EOF
        chmod 600 ~/.ssh/config
        
        # Get Private IPs of FE VMSS instances
        FE_IPS=$(az vmss nic list -g musa-project2-rg --vmss-name burger-vmss-fe-musa --query "[].ipConfigurations[0].privateIPAddress" -o tsv)
        
        for IP in $FE_IPS; do
          echo "Deploying to $IP..."
          scp frontend.zip $IP:/home/azureuser/
          ssh $IP "sudo apt-get install -y unzip && unzip -o frontend.zip -d frontend_app && cd frontend_app && sudo npm install -g pm2 serve && sudo pm2 delete frontend || true && sudo pm2 serve . 80 --spa --name frontend"
        done
